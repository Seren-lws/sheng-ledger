<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192' viewBox='0 0 192 192'>
  <rect width='192' height='192' rx='42' fill='#C4A09B'/>
  <!-- abacus frame -->
  <rect x='40' y='38' width='112' height='116' rx='8' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/>
  <!-- horizontal bar (divider) -->
  <line x1='40' y1='72' x2='152' y2='72' stroke='white' stroke-width='4'/>
  <!-- vertical rods -->
  <line x1='68' y1='38' x2='68' y2='154' stroke='white' stroke-width='3' opacity='0.5'/>
  <line x1='96' y1='38' x2='96' y2='154' stroke='white' stroke-width='3' opacity='0.5'/>
  <line x1='124' y1='38' x2='124' y2='154' stroke='white' stroke-width='3' opacity='0.5'/>
  <!-- top beads (heaven beads, 1 per rod) -->
  <ellipse cx='68' cy='56' rx='10' ry='8' fill='white' opacity='0.95'/>
  <ellipse cx='96' cy='56' rx='10' ry='8' fill='#F5E6D3' opacity='0.95'/>
  <ellipse cx='124' cy='56' rx='10' ry='8' fill='white' opacity='0.95'/>
  <!-- bottom beads (earth beads, varied positions) -->
  <!-- rod 1 -->
  <ellipse cx='68' cy='90' rx='10' ry='8' fill='white' opacity='0.9'/>
  <ellipse cx='68' cy='108' rx='10' ry='8' fill='#F5E6D3' opacity='0.9'/>
  <ellipse cx='68' cy='126' rx='10' ry='8' fill='white' opacity='0.9'/>
  <ellipse cx='68' cy='144' rx='10' ry='8' fill='#F5E6D3' opacity='0.7'/>
  <!-- rod 2 -->
  <ellipse cx='96' cy='90' rx='10' ry='8' fill='#F5E6D3' opacity='0.9'/>
  <ellipse cx='96' cy='108' rx='10' ry='8' fill='white' opacity='0.9'/>
  <ellipse cx='96' cy='126' rx='10' ry='8' fill='white' opacity='0.7'/>
  <ellipse cx='96' cy='144' rx='10' ry='8' fill='#F5E6D3' opacity='0.9'/>
  <!-- rod 3 -->
  <ellipse cx='124' cy='90' rx='10' ry='8' fill='white' opacity='0.9'/>
  <ellipse cx='124' cy='108' rx='10' ry='8' fill='white' opacity='0.9'/>
  <ellipse cx='124' cy='126' rx='10' ry='8' fill='#F5E6D3' opacity='0.9'/>
  <ellipse cx='124' cy='144' rx='10' ry='8' fill='white' opacity='0.7'/>
</svg>