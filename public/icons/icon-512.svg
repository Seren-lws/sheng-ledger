<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <rect width='512' height='512' rx='112' fill='#C4A09B'/>
  <!-- abacus frame -->
  <rect x='106' y='101' width='300' height='310' rx='21' fill='none' stroke='white' stroke-width='13' stroke-linecap='round'/>
  <!-- horizontal bar (divider) -->
  <line x1='106' y1='192' x2='406' y2='192' stroke='white' stroke-width='11'/>
  <!-- vertical rods -->
  <line x1='181' y1='101' x2='181' y2='411' stroke='white' stroke-width='8' opacity='0.5'/>
  <line x1='256' y1='101' x2='256' y2='411' stroke='white' stroke-width='8' opacity='0.5'/>
  <line x1='331' y1='101' x2='331' y2='411' stroke='white' stroke-width='8' opacity='0.5'/>
  <!-- top beads (heaven beads) -->
  <ellipse cx='181' cy='149' rx='27' ry='21' fill='white' opacity='0.95'/>
  <ellipse cx='256' cy='149' rx='27' ry='21' fill='#F5E6D3' opacity='0.95'/>
  <ellipse cx='331' cy='149' rx='27' ry='21' fill='white' opacity='0.95'/>
  <!-- bottom beads (earth beads) -->
  <!-- rod 1 -->
  <ellipse cx='181' cy='240' rx='27' ry='21' fill='white' opacity='0.9'/>
  <ellipse cx='181' cy='288' rx='27' ry='21' fill='#F5E6D3' opacity='0.9'/>
  <ellipse cx='181' cy='336' rx='27' ry='21' fill='white' opacity='0.9'/>
  <ellipse cx='181' cy='384' rx='27' ry='21' fill='#F5E6D3' opacity='0.7'/>
  <!-- rod 2 -->
  <ellipse cx='256' cy='240' rx='27' ry='21' fill='#F5E6D3' opacity='0.9'/>
  <ellipse cx='256' cy='288' rx='27' ry='21' fill='white' opacity='0.9'/>
  <ellipse cx='256' cy='336' rx='27' ry='21' fill='white' opacity='0.7'/>
  <ellipse cx='256' cy='384' rx='27' ry='21' fill='#F5E6D3' opacity='0.9'/>
  <!-- rod 3 -->
  <ellipse cx='331' cy='240' rx='27' ry='21' fill='white' opacity='0.9'/>
  <ellipse cx='331' cy='288' rx='27' ry='21' fill='white' opacity='0.9'/>
  <ellipse cx='331' cy='336' rx='27' ry='21' fill='#F5E6D3' opacity='0.9'/>
  <ellipse cx='331' cy='384' rx='27' ry='21' fill='white' opacity='0.7'/>
